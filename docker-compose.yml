version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ama-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ama-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_WS_URL=ws://localhost:8000/ws
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

networks:
  default:
    name: ama-network
